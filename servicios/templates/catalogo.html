<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catalogo - Tienda Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .logo-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }
        .user-menu { position: relative; }
        .user-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
        .user-btn:hover { background: rgba(255,255,255,0.3); }
        .user-avatar {
            width: 35px; height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .dropdown {
            position: absolute;
            top: 60px; right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-width: 220px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            z-index: 1000;
        }
        .dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .dropdown-avatar {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 10px;
            overflow: hidden;
        }
        .dropdown-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .dropdown-name { font-weight: 600; font-size: 16px; }
        .dropdown-email { font-size: 12px; opacity: 0.9; margin-top: 3px; }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            color: #333;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 14px;
        }
        .dropdown-item:hover { background: #f5f5f5; }
        .dropdown-item.icon-red { color: #e74c3c; }
        .dropdown-item.icon-red:hover { background: #fee; }
        .dropdown-divider { height: 1px; background: #eee; margin: 5px 0; }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h1 { color: #333; font-size: 36px; margin-bottom: 10px; }
        .page-title p { color: #666; font-size: 16px; }
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .producto-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }
        .producto-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .producto-img {
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 70px;
            position: relative;
            overflow: hidden;
        }
        .producto-img::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .producto-info { padding: 25px; }
        .producto-nombre { font-size: 20px; color: #333; margin-bottom: 8px; font-weight: 700; }
        .producto-desc { color: #888; margin-bottom: 15px; line-height: 1.5; font-size: 14px; }
        .producto-precio { font-size: 32px; color: #667eea; font-weight: 800; margin-bottom: 20px; }
        .producto-precio span { font-size: 16px; color: #999; font-weight: 400; }
        .btn-comprar {
            display: block; width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; text-align: center; text-decoration: none;
            border-radius: 12px; font-size: 16px; font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-comprar:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .badge {
            position: absolute;
            top: 15px; right: 15px;
            background: #ff6b6b; color: white;
            padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: 700; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-header">
            <span>🛒</span>
            <span>Tienda Digital</span>
        </div>
        <div class="user-menu">
            <div class="user-btn" onclick="toggleMenu()">
                <div class="user-avatar" id="menuAvatar">👤</div>
                <span id="menuNombre">Cargando...</span>
                <span>▼</span>
            </div>
            <div class="dropdown" id="userDropdown">
                <div class="dropdown-header">
                    <div class="dropdown-avatar" id="dropdownAvatar">👤</div>
                    <div class="dropdown-name" id="dropdownNombre">Usuario</div>
                    <div class="dropdown-email" id="dropdownEmail">email</div>
                </div>
                <a href="/perfil" class="dropdown-item"><span>👤</span><span>Mi Perfil</span></a>
                <a href="/compras" class="dropdown-item"><span>📋</span><span>Mis Compras</span></a>
                <div class="dropdown-divider"></div>
                <a href="#" onclick="cerrarSesion()" class="dropdown-item icon-red"><span>🚪</span><span>Cerrar Sesion</span></a>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="page-title">
            <h1>🛍️ Nuestros Productos</h1>
            <p>Selecciona el servicio o producto que deseas adquirir</p>
        </div>
        <div class="productos-grid" id="productosGrid">
            <p style="text-align:center; color:#888;">Cargando productos...</p>
        </div>
    </div>

    <script>
        async function cargarUsuario() {
            try {
                const res = await fetch('/api/sesion');
                const data = await res.json();
                if (!data.loggedIn) {
                    window.location.href = '/';
                    return;
                }
                document.getElementById('menuNombre').textContent = data.user.nombre;
                document.getElementById('dropdownNombre').textContent = data.user.nombre;
                document.getElementById('dropdownEmail').textContent = data.user.email;
                
                if (data.user.foto) {
                    const img = '<img src="/static/uploads/' + data.user.foto + '" alt="Foto">';
                    document.getElementById('menuAvatar').innerHTML = img;
                    document.getElementById('dropdownAvatar').innerHTML = img;
                }
            } catch (err) {
                window.location.href = '/';
            }
        }

        async function cargarProductos() {
            try {
                const res = await fetch('/api/productos');
                const productos = await res.json();
                const grid = document.getElementById('productosGrid');
                
                if (productos.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#888;">No hay productos disponibles</p>';
                    return;
                }
                
                let html = '';
                productos.forEach(p => {
                    const oferta = p.precio <= 10 ? '<div class="badge">OFERTA</div>' : '';
                    html += `
                    <div class="producto-card">
                        ${oferta}
                        <div class="producto-img">📦</div>
                        <div class="producto-info">
                            <h3 class="producto-nombre">${p.nombre}</h3>
                            <p class="producto-desc">${p.descripcion || ''}</p>
                            <div class="producto-precio">
                                $${parseFloat(p.precio).toFixed(2)} 
                                <span>MXN</span>
                            </div>
                            <a href="/pago?id=${p.id}" class="btn-comprar">💳 Pagar</a>
                        </div>
                    </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (err) {
                document.getElementById('productosGrid').innerHTML = 
                    '<p style="text-align:center; color:#e74c3c;">Error cargando productos</p>';
            }
        }

        function toggleMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }
        document.addEventListener('click', function(e) {
            const menu = document.querySelector('.user-menu');
            const dropdown = document.getElementById('userDropdown');
            if (!menu.contains(e.target)) dropdown.classList.remove('active');
        });

        async function cerrarSesion() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        cargarUsuario();
        cargarProductos();
    </script>
</body>
</html>
